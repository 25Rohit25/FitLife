version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: fitlifepro-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./server-java
    container_name: fitlifepro-backend
    ports:
      - "5000:5000"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/fitlifepro
      - GEMINI_API_KEY=AIzaSyCqO-7KO9tPws3HP3Gy6xAtwRf_VccPYr4
    depends_on:
      - mongodb

  frontend:
    build: ./client
    container_name: fitlifepro-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data:
